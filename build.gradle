plugins {
    id 'java'
    id 'antlr'
    id 'idea'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    antlr "org.antlr:antlr4:4.13.2"
    implementation "org.antlr:antlr4-runtime:4.13.2"
    implementation 'org.apache.commons:commons-numbers-fraction:1.2'
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        antlr {
            srcDirs = ['src/main/antlr']
        }
    }
}

application {
    mainClass.set('Entry.Main')
}

generateGrammarSource {
    maxHeapSize = "128m"
    outputDirectory = file("src/main/java/Parser/Generated")
    arguments += ["-visitor"]
}
